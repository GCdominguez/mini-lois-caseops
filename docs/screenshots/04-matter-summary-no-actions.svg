<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675"><rect width="1200" height="675" fill="#f6f8fa"/><rect x="35" y="35" width="1130" height="605" rx="24" fill="#fff" stroke="#d0d7de"/><text x="80" y="100" font-family="Arial" font-size="34" font-weight="700" fill="#24292f">Matter summary with no actionable recommendations</text><text x="80" y="155" font-family="Arial" font-size="18" fill="#57606a">Mini LOIS summarizes the selected matter and correctly does not generate tasks when the answer is informational.</text><rect x="80" y="210" width="650" height="300" rx="14" fill="#fff" stroke="#d0d7de"/><text x="110" y="260" font-family="Arial" font-size="28" font-weight="700" fill="#24292f">Answer</text><text x="110" y="315" font-family="Arial" font-size="18" fill="#24292f">Matter summary generated from retrieved context.</text><text x="110" y="355" font-family="Arial" font-size="18" fill="#24292f">The answer highlights facts, gaps, and risks.</text><text x="110" y="395" font-family="Arial" font-size="18" fill="#24292f">No action is created unless recommendations are detected.</text><rect x="780" y="210" width="330" height="190" rx="14" fill="#fff" stroke="#d0d7de"/><text x="810" y="265" font-family="Arial" font-size="28" font-weight="700" fill="#24292f">Quick task actions</text><text x="810" y="320" font-family="Arial" font-size="18" fill="#57606a">No discrete recommendations detected.</text></svg>